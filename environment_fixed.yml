name: bulk_transformer_env
channels:
  - conda-forge
  - anaconda
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
dependencies:
  # ── Core Python & system libs ──────────────────────────────────────────────
  - python=3.12.7
  - pip
  - setuptools
  - wheel

  # ── Scientific stack (conda-managed for reliable BLAS linkage) ────────────
  - numpy=2.0.2
  - scipy=1.17.1
  - pandas=2.2.3
  - scikit-learn=1.5.2
  - joblib
  - threadpoolctl

  # ── Plotting ──────────────────────────────────────────────────────────────
  - matplotlib-base
  - seaborn
  - plotly

  # ── Dimensionality reduction ──────────────────────────────────────────────
  - umap-learn
  - pynndescent

  # ── Misc utilities ────────────────────────────────────────────────────────
  - tqdm
  - requests
  - six
  - packaging

  # ── pip-only packages (no CUDA wheels here — installed separately below) ──
  - pip:
      # Transformer / attention utilities
      - einops==0.8.2
      - performer-pytorch==1.1.4
      - axial-positional-embedding==0.3.12
      - local-attention==1.11.2
      - hyper-connections==0.4.9
      - torch-einops-utils==0.0.30

      # Pinned to 3.1.0 to avoid the libproton.so NFS permissions bug in 3.2.x
      - triton==3.1.0

      # Async / networking (pulled in by torch ecosystem)
      - aiohappyeyeballs==2.6.1
      - aiohttp==3.13.3
      - aiosignal==1.4.0
      - attrs==25.4.0
      - frozenlist==1.8.0
      - multidict==6.7.1
      - propcache==0.4.1
      - yarl==1.22.0

      # Other pure-Python deps
      - filelock==3.24.3
      - fsspec==2026.2.0
      - jinja2==3.1.6
      - markupsafe==3.0.3
      - mpmath==1.3.0
      - networkx==3.6.1
      - psutil==7.2.2
      - sympy==1.13.1
      - typing-extensions==4.15.0
      - pytz==2025.2
      - tzdata==2025.3

      # NOTE: torch, torchvision, torchaudio, torch-sparse, torch-scatter,
      # torch-cluster, torch-spline-conv, torch-geometric are intentionally
      # omitted here. Install them AFTER conda create using install_torch.sh.
      #
      # performer-pytorch lists torch as a dependency but we manage torch
      # ourselves via install_torch.sh to get the correct CUDA build.
      # The --no-deps flag below prevents pip pulling torch 2.6 from PyPI here.
